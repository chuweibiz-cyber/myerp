<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日光手感 ERP - V1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between bg-white p-6 rounded-xl shadow-sm border border-slate-200 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">日光手感 ERP <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded ml-2">V1.1</span></h1>
                <p class="text-sm text-slate-500 mt-1">先賣後買 + TOP10 預備庫存補貨邏輯</p>
            </div>
            <div class="w-full md:w-96">
                <input type="text" id="searchInput" oninput="renderApp()" placeholder="🔍 超級搜尋（輸入商品、尺寸如 100、顏色如 白）..." 
                       class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>
        </header>

        <!-- QDM File Upload Area -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-3">📥 QDM 報表匯入專區</h2>
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:bg-slate-50 transition cursor-pointer">
                <p class="text-slate-600 font-medium">拖拽 QDM 報表 (order_export.xlsx / product_purchased_ex.xlsx) 至此處，或點擊選擇檔案</p>
                <p class="text-xs text-slate-400 mt-1">支援自動解析 QDM 規格與前日銷量更新</p>
                <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv" onchange="handleFileSelect(event)">
            </div>
        </section>

        <!-- Purchase & Inventory Management Table -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">📋 採購管理與補貨建議</h2>
                <span class="text-xs text-slate-500">一般商品公式：採購建議 = Max(0, 前日銷售 - 目前庫存)</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600">
                            <th class="p-3">商品名稱</th>
                            <th class="p-3">規格 (尺寸/顏色)</th>
                            <th class="p-3">類型</th>
                            <th class="p-3">前日銷售</th>
                            <th class="p-3">目前庫存</th>
                            <th class="p-3 text-indigo-700">建議採購</th>
                            <th class="p-3 text-indigo-700">採購數量（可修改）</th>
                            <th class="p-3">狀態</th>
                            <th class="p-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // 預設示範資料
        let products = [
            { id: 1, name: "熊熊短袖包屁衣", size: "80", color: "白", isTop10: false, targetStock: 0, sales: 5, stock: 5, buyQty: 0 },
            { id: 2, name: "熊熊短袖包屁衣", size: "90", color: "粉", isTop10: false, targetStock: 0, sales: 2, stock: 5, buyQty: 0 },
            { id: 3, name: "有機棉連身衣 (熱銷)", size: "100", color: "綠", isTop10: true, targetStock: 10, sales: 2, stock: 3, buyQty: 9 }
        ];

        // 計算建議採購量公式
        function calculateSuggest(p) {
            if (p.isTop10) {
                // TOP10 熱銷品公式：前日銷售 + 預備庫存 - 目前庫存
                return Math.max(0, p.sales + p.targetStock - p.stock);
            } else {
                // 一般商品公式：前日銷售 - 目前庫存
                return Math.max(0, p.sales - p.stock);
            }
        }

        function renderApp() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const tbody = document.getElementById('inventoryTable');
            tbody.innerHTML = '';

            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.size.toLowerCase().includes(query) || 
                p.color.toLowerCase().includes(query)
            );

            filtered.forEach(p => {
                const suggest = calculateSuggest(p);
                
                // 狀態標籤判斷
                let statusBadge = '';
                if (suggest > 0) {
                    statusBadge = '<span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-medium">需補進貨</span>';
                } else {
                    statusBadge = '<span class="px-2 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-medium">庫存充足</span>';
                }

                const displayBuyQty = (p.buyQty !== undefined && p.buyQty !== null) ? p.buyQty : suggest;

                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-100 hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="p-3 font-medium text-slate-800">${p.name}</td>
                    <td class="p-3"><span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs font-mono">${p.size} / ${p.color}</span></td>
                    <td class="p-3">${p.isTop10 ? '<span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold">TOP10</span>' : '<span class="text-xs text-slate-400">一般</span>'}</td>
                    <td class="p-3 font-semibold text-slate-900">${p.sales} 件</td>
                    <td class="p-3 font-semibold text-slate-900">${p.stock} 件 ${p.isTop10 ? `<span class="text-xs text-slate-400">(預備${p.targetStock})</span>` : ''}</td>
                    <td class="p-3 font-bold text-indigo-600">${suggest} 件</td>
                    <td class="p-3">
                        <input type="number" min="0" value="${displayBuyQty}" onchange="updateBuyQty(${p.id}, this.value)" 
                               class="w-20 border border-slate-300 rounded px-2 py-1 text-center font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500"> 件
                    </td>
                    <td class="p-3">${statusBadge}</td>
                    <td class="p-3">
                        <button onclick="receiveStock(${p.id})" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-xs font-medium transition shadow-sm">
                            收貨入庫
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateBuyQty(id, val) {
            const p = products.find(item => item.id === id);
            if (p) {
                p.buyQty = parseInt(val) || 0;
            }
        }

        function receiveStock(id) {
            const p = products.find(item => item.id === id);
            if (p) {
                const suggest = calculateSuggest(p);
                const addQty = (p.buyQty !== undefined && p.buyQty !== null) ? p.buyQty : suggest;
                if (addQty <= 0) {
                    alert('目前採購數量為 0，無需收貨！');
                    return;
                }
                p.stock += addQty;
                p.buyQty = calculateSuggest(p);
                renderApp();
                alert(`【收貨成功】${p.name} (${p.size}/${p.color}) 入庫 +${addQty} 件！最新庫存：${p.stock} 件`);
            }
        }

        // QDM Drag & Drop File Parser
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-slate-50'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-slate-50'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-slate-50');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFileSelect(e) {
            if (e.target.files.length) handleFile(e.target.files[0]);
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                if (jsonData.length > 0) {
                    parseQDMData(jsonData);
                } else {
                    alert('無法讀取報表資料，請確認檔案格式是否正確！');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseQDMData(data) {
            products = [];
            let idCounter = 1;

            data.forEach((row) => {
                const name = row['商品名稱'] || row['Product Name'] || row['商品'] || 'QDM商品';
                const spec = String(row['規格'] || row['尺寸'] || row['Option'] || '');
                const qty = parseInt(row['數量'] || row['購買數量'] || row['Qty'] || 1);

                let size = "通用";
                let color = "預設";
                
                if (spec.includes("73")) size = "73";
                else if (spec.includes("80")) size = "80";
                else if (spec.includes("90")) size = "90";
                else if (spec.includes("100")) size = "100";
                else if (spec.includes("110")) size = "110";
                else if (spec.includes("120")) size = "120";

                if (spec.includes("白")) color = "白";
                else if (spec.includes("粉")) color = "粉";
                else if (spec.includes("黃")) color = "黃";
                else if (spec.includes("綠")) color = "綠";
                else if (spec.includes("藍")) color = "藍";

                const existing = products.find(p => p.name === name && p.size === size && p.color === color);
                if (existing) {
                    existing.sales += qty;
                    existing.buyQty = calculateSuggest(existing);
                } else {
                    const newProd = {
                        id: idCounter++,
                        name: name,
                        size: size,
                        color: color,
                        isTop10: false,
                        targetStock: 0,
                        sales: qty,
                        stock: 0,
                        buyQty: qty
                    };
                    products.push(newProd);
                }
            });

            renderApp();
            alert(`✅ 成功匯入 QDM 報表！已解析出 ${products.length} 項商品規格。`);
        }

        // 頁面初始化
        renderApp();
    </script>
</body>
</html>
