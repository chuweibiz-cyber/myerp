<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童服飾 ERP Lite - V1.2 (修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between bg-white p-6 rounded-xl shadow-sm border border-slate-200 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">兒童服飾 ERP Lite <span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded ml-2">V1.2 邏輯校正版</span></h1>
                <p class="text-sm text-slate-500 mt-1">先賣後買：採購建議 = Max(0, 前日銷售 - 目前庫存)</p>
            </div>
            <div class="w-full md:w-96">
                <input type="text" id="searchInput" oninput="renderApp()" placeholder="🔍 超級搜尋（輸入商品、尺寸如 73、顏色如 白）..." 
                       class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>
        </header>

        <!-- QDM File Upload Area -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-3">📥 QDM 報表匯入專區</h2>
            <div id="dropZone" class="border-2 border-dashed border-indigo-300 bg-indigo-50/30 rounded-xl p-6 text-center hover:bg-indigo-50 transition cursor-pointer">
                <p class="text-indigo-900 font-bold">點擊選擇檔案，或拖拽 QDM 報表 (order_export.xlsx / product_purchased_ex.xlsx) 到這裡</p>
                <p class="text-xs text-indigo-500 mt-1">匯入後會自動讀取商品名稱、規格，並即時計算銷量與採購建議！</p>
                <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv" onchange="handleFileSelect(event)">
            </div>
        </section>

        <!-- Purchase & Inventory Management Table -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">📋 採購管理與補貨建議</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600">
                            <th class="p-3">商品名稱</th>
                            <th class="p-3">規格 (顏色/尺寸)</th>
                            <th class="p-3 text-center">前日銷售</th>
                            <th class="p-3 text-center">目前庫存</th>
                            <th class="p-3 text-center text-indigo-700 font-bold bg-indigo-50/50">建議採購數量</th>
                            <th class="p-3 text-center">採購數量（可修改）</th>
                            <th class="p-3 text-center">系統狀態</th>
                            <th class="p-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // 初始測試資料（嚴格鎖定邏輯）
        let products = [
            { id: 1, name: "熊熊連身衣", size: "73", color: "白", sales: 2, stock: 4, buyQty: 0 },
            { id: 2, name: "熊熊連身衣", size: "80", color: "白", sales: 1, stock: 3, buyQty: 0 },
            { id: 3, name: "熊熊連身衣", size: "90", color: "白", sales: 2, stock: 1, buyQty: 1 }
        ];

        // 純粹且嚴謹的計算公式：前日銷售 - 目前庫存
        function calculateSuggest(p) {
            const diff = p.sales - p.stock;
            return diff > 0 ? diff : 0;
        }

        function renderApp() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const tbody = document.getElementById('inventoryTable');
            tbody.innerHTML = '';

            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.size.toLowerCase().includes(query) || 
                p.color.toLowerCase().includes(query)
            );

            filtered.forEach(p => {
                const suggest = calculateSuggest(p);

                let statusBadge = '';
                if (suggest > 0) {
                    statusBadge = '<span class="px-2 py-1 bg-amber-100 text-amber-800 rounded-full text-xs font-bold">⚠️ 接單待採購</span>';
                } else {
                    statusBadge = '<span class="px-2 py-1 bg-emerald-100 text-emerald-800 rounded-full text-xs font-bold">✅ 庫存充足</span>';
                }

                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-100 hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="p-3 font-medium text-slate-900">${p.name}</td>
                    <td class="p-3"><span class="bg-slate-200 text-slate-800 px-2 py-0.5 rounded text-xs font-mono">${p.color}/${p.size}</span></td>
                    <td class="p-3 text-center font-bold text-slate-700">${p.sales}</td>
                    <td class="p-3 text-center font-bold text-slate-700">${p.stock}</td>
                    <td class="p-3 text-center font-extrabold text-indigo-600 bg-indigo-50/30 text-base">${suggest}</td>
                    <td class="p-3 text-center">
                        <input type="number" min="0" value="${p.buyQty !== undefined ? p.buyQty : suggest}" onchange="updateBuyQty(${p.id}, this.value)" 
                               class="w-20 border border-slate-300 rounded px-2 py-1 text-center font-bold text-indigo-900 focus:ring-2 focus:ring-indigo-500">
                    </td>
                    <td class="p-3 text-center">${statusBadge}</td>
                    <td class="p-3 text-center">
                        <button onclick="receiveStock(${p.id})" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-xs font-bold transition shadow-sm">
                            收貨入庫
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateBuyQty(id, val) {
            const p = products.find(item => item.id === id);
            if (p) {
                p.buyQty = parseInt(val) || 0;
            }
        }

        function receiveStock(id) {
            const p = products.find(item => item.id === id);
            if (p) {
                const suggest = calculateSuggest(p);
                const addQty = p.buyQty !== undefined ? p.buyQty : suggest;
                if (addQty <= 0) {
                    alert('目前採購數量為 0，無須收貨！');
                    return;
                }
                p.stock += addQty;
                p.buyQty = calculateSuggest(p);
                renderApp();
                alert(`【收貨成功】${p.name} (${p.color}/${p.size}) 已入庫 +${addQty} 件！最新庫存：${p.stock} 件`);
            }
        }

        // QDM Drag & Drop File Parser
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-100/50'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-indigo-100/50'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-100/50');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        function handleFileSelect(e) {
            if (e.target.files.length) handleFile(e.target.files[0]);
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                if (jsonData.length > 0) {
                    parseQDMData(jsonData);
                } else {
                    alert('無法讀取報表資料，請確認檔案格式是否正確！');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseQDMData(data) {
            // 清空舊的測試資料，以 QDM 報表為主
            products = [];
            let idCounter = 1;

            data.forEach((row) => {
                const name = row['商品名稱'] || row['Product Name'] || row['商品'] || '未命名商品';
                const spec = String(row['規格'] || row['尺寸'] || row['Option'] || '');
                const qty = parseInt(row['數量'] || row['購買數量'] || row['Qty'] || 1);

                let size = "通用";
                let color = "預設";
                
                // 自動拆解尺寸
                if (spec.includes("73")) size = "73";
                else if (spec.includes("80")) size = "80";
                else if (spec.includes("90")) size = "90";
                else if (spec.includes("100")) size = "100";
                else if (spec.includes("110")) size = "110";
                else if (spec.includes("120")) size = "120";

                // 自動拆解顏色
                if (spec.includes("白")) color = "白";
                else if (spec.includes("粉")) color = "粉";
                else if (spec.includes("黃")) color = "黃";
                else if (spec.includes("綠")) color = "綠";
                else if (spec.includes("藍")) color = "藍";
                else if (spec.includes("黑")) color = "黑";

                const existing = products.find(p => p.name === name && p.size === size && p.color === color);
                if (existing) {
                    existing.sales += qty;
                    existing.buyQty = calculateSuggest(existing);
                } else {
                    const newProd = {
                        id: idCounter++,
                        name: name,
                        size: size,
                        color: color,
                        sales: qty,
                        stock: 0,
                        buyQty: qty
                    };
                    products.push(newProd);
                }
            });

            renderApp();
            alert(`✅ 成功匯入 QDM 報表！已解析出 ${products.length} 項商品規格組合。`);
        }

        // 頁面初始化
        renderApp();
    </script>
</body>
</html>
